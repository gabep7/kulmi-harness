name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    strategy:
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install Linux sandbox
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          if [ -e /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - run: npm ci
      - run: npm run check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Verify tag matches package version
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p 'require("./package.json").version')"
      - name: Smoke-test package
        run: npm run test:package
      - run: npm pack
      - name: Build fast installer bundle
        run: |
          npm prune --omit=dev --ignore-scripts --no-audit --no-fund
          tar -czf kulmi-node.tar.gz dist node_modules package.json README.md LICENSE
          test "$(node dist/cli.js --version)" = "${GITHUB_REF_NAME#v}"
          sha256sum kulmi-node.tar.gz > kulmi-node.tar.gz.sha256
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            *.tgz
            kulmi-node.tar.gz
            kulmi-node.tar.gz.sha256
          generate_release_notes: true
