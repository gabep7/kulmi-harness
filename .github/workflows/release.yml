name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  check:
    strategy:
      matrix:
        node: [22, 24]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm pack
      - name: Build fast installer bundle
        run: |
          npm prune --omit=dev --ignore-scripts --no-audit --no-fund
          tar -czf kulmi-node.tar.gz dist node_modules package.json README.md
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tgz
            kulmi-node.tar.gz
          generate_release_notes: true
